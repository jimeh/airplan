name: Update Mermaid

on:
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

concurrency:
  group: update-mermaid
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - run: mise run update:mermaid
      - run: mise run check
      - id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: chore/update-mermaid
        run: |
          git config user.name "airplan-release-bot[bot]"
          git config user.email "airplan-release-bot[bot]@users.noreply.github.com"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git switch -C "$BRANCH"
          git add -A -- internal/deps/mermaid.json airplan/mermaid_generated.go \
            airplan/testdata/TestRenderMarkdownGolden
          git commit -m "chore(deps): update Mermaid"
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force-with-lease origin "$BRANCH"
          pr_number="$(gh pr list --head "$BRANCH" --state open \
            --json number,headRepositoryOwner \
            --jq "map(select(.headRepositoryOwner.login == \
              \"${GITHUB_REPOSITORY_OWNER}\"))[0].number // \"\"")"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" --title "chore(deps): update Mermaid" \
              --body "Updates the pinned Mermaid runtime after the 72-hour minimum age."
          else
            gh pr create --draft --base main --head "$BRANCH" \
              --title "chore(deps): update Mermaid" \
              --body "Updates the pinned Mermaid runtime after the 72-hour minimum age."
          fi
