name: release

on:
  workflow_call:
    inputs:
      sha:
        description: Commit SHA associated with the draft release
        required: true
        type: string
      tag:
        description: Release tag associated with the draft release
        required: true
        type: string
    secrets:
      RELEASE_BOT_PRIVATE_KEY:
        description: Private key for the release bot GitHub App
        required: true
      MACOS_SIGN_P12:
        description: Base64-encoded Developer ID Application identity
        required: true
      MACOS_SIGN_PASSWORD:
        description: Password for the Developer ID PKCS#12 identity
        required: true
      MACOS_NOTARY_KEY:
        description: Base64-encoded App Store Connect API private key
        required: true
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA associated with the draft release
        required: true
        type: string
      tag:
        description: Release tag associated with the draft release
        required: true
        type: string

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

permissions: {}

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    outputs:
      release_id: ${{ steps.draft.outputs.release_id }}
      cask_artifact: ${{ steps.cask-artifact.outputs.name }}
      container_artifact: ${{ steps.container-artifact.outputs.name }}
    env:
      MISE_DISABLE_TOOLS: go
      RELEASE_SHA: ${{ inputs.sha }}
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.sha }}
      - name: Validate macOS signing configuration
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ vars.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ vars.MACOS_NOTARY_ISSUER_ID }}
          MACOS_TEAM_ID: ${{ vars.MACOS_TEAM_ID }}
        run: |
          for name in \
            MACOS_SIGN_P12 \
            MACOS_SIGN_PASSWORD \
            MACOS_NOTARY_KEY \
            MACOS_NOTARY_KEY_ID \
            MACOS_NOTARY_ISSUER_ID \
            MACOS_TEAM_ID; do
            if [[ -z "${!name}" ]]; then
              echo "$name is required for a production release" >&2
              exit 1
            fi
          done
      - id: draft
        name: Validate draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release="$({
            gh api --paginate "repos/${GITHUB_REPOSITORY}/releases"
          } | jq -sc --arg tag "$RELEASE_TAG" '
            [.[].[] | select(.draft and .tag_name == $tag)]
            | if length == 1 then .[0]
              elif length == 0 then error("draft release not found")
              else error("multiple matching draft releases found")
              end
          ')"
          target="$(jq -r '.target_commitish' <<<"$release")"
          if [[ "$target" != "$RELEASE_SHA" ]]; then
            echo "draft targets $target, expected $RELEASE_SHA" >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]]; then
            echo "checkout does not match release SHA" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor \
            "$RELEASE_SHA" refs/remotes/origin/main; then
            echo "release SHA is not contained in origin/main" >&2
            exit 1
          fi
          echo "release_id=$(jq -r '.id' <<<"$release")" \
            >>"$GITHUB_OUTPUT"
      - name: Prepare local release tag
        run: |
          if git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"; then
            if [[ "$(git rev-list -n 1 "$RELEASE_TAG")" != "$RELEASE_SHA" ]]; then
              echo "$RELEASE_TAG points at an unexpected commit" >&2
              exit 1
            fi
          else
            git tag "$RELEASE_TAG" "$RELEASE_SHA"
          fi
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum
          cache: false
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          add_shims_to_path: false
          # No tool cache on release builds: restored caches are an
          # injection vector for published artifacts (zizmor
          # cache-poisoning).
          cache: false
      - name: Build and upload draft release
        run: mise exec -- goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
          MACOS_NOTARY_KEY_ID: ${{ vars.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ vars.MACOS_NOTARY_ISSUER_ID }}
      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: dist/checksums.txt
      - name: Verify draft release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ steps.draft.outputs.release_id }}
        run: |
          (cd dist && sha256sum --check checksums.txt)

          awk '{print $2}' dist/checksums.txt >expected-assets.txt
          printf '%s\n' airplan.schema.json checksums.txt \
            >>expected-assets.txt
          sort -u -o expected-assets.txt expected-assets.txt

          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" \
            | jq -sr 'add | sort_by(.name)' >release-assets.json
          jq -r '.[].name' release-assets.json >actual-assets.txt
          diff -u expected-assets.txt actual-assets.txt

          jq -r '.[] | [.name, .digest, .size, .state] | @tsv' \
            release-assets.json \
            | while IFS=$'\t' read -r name digest size state; do
                path="dist/$name"
                if [[ "$name" == "airplan.schema.json" ]]; then
                  path="schema/airplan.schema.json"
                fi
                if [[ "$state" != "uploaded" || "$size" -le 0 ]]; then
                  echo "$name is not a complete, non-empty upload" >&2
                  exit 1
                fi
                actual="sha256:$(sha256sum "$path" | awk '{print $1}')"
                if [[ "$digest" != "$actual" ]]; then
                  echo "$name digest mismatch: $digest != $actual" >&2
                  exit 1
                fi
              done
      - name: Prepare verified container context
        run: >-
          go run ./internal/cmd/preparecontainer
          --verify-archives
      - id: container-artifact
        name: Name container context artifact
        run: |
          echo "name=container-context-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            >>"$GITHUB_OUTPUT"
      - name: Preserve verified container context
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.container-artifact.outputs.name }}
          path: dist/container/
          if-no-files-found: error
          include-hidden-files: true
          retention-days: 7
      - id: cask-artifact
        name: Name generated Homebrew Cask artifact
        run: |
          echo "name=homebrew-cask-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            >>"$GITHUB_OUTPUT"
      - name: Preserve generated Homebrew Cask
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.cask-artifact.outputs.name }}
          path: dist/homebrew/Casks/airplan.rb
          if-no-files-found: error
          retention-days: 7

  verify-macos:
    needs: build-release
    name: verify macOS (${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    permissions:
      # GitHub requires push access to read assets from a draft release.
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            goarch: arm64
            runner_arch: arm64
            binary_arch: arm64
          - runner: macos-15-intel
            goarch: amd64
            runner_arch: x86_64
            binary_arch: x86_64
    env:
      RELEASE_ID: ${{ needs.build-release.outputs.release_id }}
      RELEASE_TAG: ${{ inputs.tag }}
      EXPECTED_GOARCH: ${{ matrix.goarch }}
      EXPECTED_RUNNER_ARCH: ${{ matrix.runner_arch }}
      EXPECTED_BINARY_ARCH: ${{ matrix.binary_arch }}
      MACOS_TEAM_ID: ${{ vars.MACOS_TEAM_ID }}
    steps:
      - name: Download native macOS archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_DIR: ${{ runner.temp }}/airplan-macos-verification
        run: |
          set -o pipefail
          mkdir -p "$VERIFY_DIR"
          cd "$VERIFY_DIR"

          version="${RELEASE_TAG#v}"
          archive="airplan_${version}_darwin_${EXPECTED_GOARCH}.tar.gz"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" \
            | jq -s 'add' >release-assets.json

          download_asset() {
            local name="$1"
            local count id
            count="$(jq --arg name "$name" \
              '[.[] | select(.name == $name)] | length' \
              release-assets.json)"
            if [[ "$count" != "1" ]]; then
              echo "expected one $name asset, found $count" >&2
              exit 1
            fi
            id="$(jq -r --arg name "$name" \
              '.[] | select(.name == $name) | .id' release-assets.json)"
            gh api -H 'Accept: application/octet-stream' \
              "repos/${GITHUB_REPOSITORY}/releases/assets/${id}" >"$name"
          }

          download_asset "$archive"
          download_asset checksums.txt

      - name: Verify native macOS archive
        env:
          VERIFY_DIR: ${{ runner.temp }}/airplan-macos-verification
        run: |
          cd "$VERIFY_DIR"

          version="${RELEASE_TAG#v}"
          archive="airplan_${version}_darwin_${EXPECTED_GOARCH}.tar.gz"

          checksum_entry="$(awk -v name="$archive" \
            '$2 == name { print }' checksums.txt)"
          checksum_count="$(awk -v name="$archive" \
            '$2 == name { count++ } END { print count + 0 }' checksums.txt)"
          if [[ "$checksum_count" != "1" ]]; then
            echo "expected one checksum for $archive" >&2
            exit 1
          fi
          printf '%s\n' "$checksum_entry" >checksums-entry.txt
          shasum -a 256 -c checksums-entry.txt

          if [[ "$(uname -m)" != "$EXPECTED_RUNNER_ARCH" ]]; then
            echo "unexpected runner architecture: $(uname -m)" >&2
            exit 1
          fi

          mkdir extracted
          tar -xzf "$archive" -C extracted
          binary="$VERIFY_DIR/extracted/airplan"
          if [[ ! -x "$binary" ]]; then
            echo "archive does not contain an executable airplan binary" >&2
            exit 1
          fi
          if [[ "$(lipo -archs "$binary")" != "$EXPECTED_BINARY_ARCH" ]]; then
            echo "binary does not match the expected native architecture" >&2
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "$binary"
          signature="$(codesign -dvvv "$binary" 2>&1)"
          printf '%s\n' "$signature"

          if ! grep -q '^Authority=Developer ID Application:' \
            <<<"$signature"; then
            echo "binary lacks a Developer ID Application authority" >&2
            exit 1
          fi
          if ! grep -Fxq "TeamIdentifier=$MACOS_TEAM_ID" \
            <<<"$signature"; then
            echo "binary is signed by an unexpected Apple team" >&2
            exit 1
          fi
          if ! grep -Eq \
            '^CodeDirectory .* flags=0x[0-9a-fA-F]+\([^)]*runtime[^)]*\)' \
            <<<"$signature"; then
            echo "binary lacks the hardened runtime flag" >&2
            exit 1
          fi
          timestamp="$(sed -n 's/^Timestamp=//p' <<<"$signature")"
          if [[ -z "$timestamp" || "$timestamp" == "none" ]]; then
            echo "binary lacks a secure signing timestamp" >&2
            exit 1
          fi

          notarization_verified=false
          for attempt in {1..3}; do
            if codesign -vvvv -R='notarized' \
              --check-notarization "$binary"; then
              notarization_verified=true
              break
            fi
            if [[ "$attempt" -lt 3 ]]; then
              sleep "$((attempt * 2))"
            fi
          done
          if [[ "$notarization_verified" != "true" ]]; then
            echo "online notarization-ticket verification failed" >&2
            exit 1
          fi

          version_output="$("$binary" --version)"
          actual_version="${version_output#airplan version }"
          if [[ "$actual_version" == "$version_output" || \
            "$actual_version" != "$version" ]]; then
            echo "unexpected version output: $version_output" >&2
            exit 1
          fi

  publish:
    needs:
      - build-release
      - verify-macos
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    env:
      RELEASE_ID: ${{ needs.build-release.outputs.release_id }}
      RELEASE_SHA: ${{ inputs.sha }}
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - id: publish
        name: Publish immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")"
          jq -e \
            --arg tag "$RELEASE_TAG" \
            --arg sha "$RELEASE_SHA" \
            '.draft and .tag_name == $tag and .target_commitish == $sha' \
            <<<"$release" >/dev/null

          published="$(gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false -f make_latest=true)"
          jq -e '.draft == false' <<<"$published" >/dev/null
          echo "published=true" >>"$GITHUB_OUTPUT"
          jq -e '.immutable == true' <<<"$published" >/dev/null

          for attempt in {1..5}; do
            if gh release verify "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY"; then
              exit 0
            fi
            sleep "$((attempt * 2))"
          done
          echo "immutable release attestation was not ready" >&2
          exit 1
      - name: Report published release verification failure
        if: failure() && steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Release verification failed for $RELEASE_TAG"
          message="The immutable release was published, but its release "
          message+="attestation could not be verified."
          body="$(printf '%s\n\n%s\n%s\n%s\n' \
            "$message" \
            "- Release: $RELEASE_TAG" \
            "- Repository: $GITHUB_REPOSITORY" \
            "- Workflow run: $RUN_URL")"
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$title" --body "$body"

  publish-container:
    needs:
      - build-release
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
      issues: write
    env:
      IMAGE_NAME: ghcr.io/jimeh/airplan
      RELEASE_SHA: ${{ inputs.sha }}
      RELEASE_TAG: ${{ inputs.tag }}
      PUBLICATION_PHASE: initialize
      PUSHED_DIGEST: none
      EXACT_TAG_CREATED: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ inputs.sha }}
      - name: Restore verified container context
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-release.outputs.container_artifact }}
          path: dist/container
      - id: release
        name: Validate immutable release identity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PUBLICATION_PHASE=validate-release" >>"$GITHUB_ENV"
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tag does not contain an exact stable version" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          release="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")"
          jq -e \
            --arg tag "$RELEASE_TAG" \
            --arg sha "$RELEASE_SHA" \
            '.draft == false and .immutable == true
              and .tag_name == $tag and .target_commitish == $sha' \
            <<<"$release" >/dev/null
          if [[ "$(git rev-parse HEAD)" != "$RELEASE_SHA" ]]; then
            echo "checkout does not match release SHA" >&2
            exit 1
          fi
          echo "version=$version" >>"$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: existing
        name: Inspect existing exact-version tag
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "PUBLICATION_PHASE=inspect-existing-tag" >>"$GITHUB_ENV"
          if inspection="$(docker buildx imagetools inspect \
            "$IMAGE_NAME:$VERSION" 2>inspect-error)"; then
            digest="$(sed -n \
              's/^Digest:[[:space:]]*\\(sha256:[0-9a-f]\\{64\\}\\)$/\\1/p' \
              <<<"$inspection")"
            if [[ -z "$digest" ]]; then
              echo "existing tag has no valid top-level digest" >&2
              exit 1
            fi
            echo "exists=true" >>"$GITHUB_OUTPUT"
            echo "digest=$digest" >>"$GITHUB_OUTPUT"
          elif grep -Eqi 'manifest unknown|name unknown|not found' \
            inspect-error; then
            echo "exists=false" >>"$GITHUB_OUTPUT"
          else
            cat inspect-error >&2
            exit 1
          fi
      - name: Begin canonical image build
        if: steps.existing.outputs.exists != 'true'
        run: |
          echo "PUBLICATION_PHASE=build-image" >>"$GITHUB_ENV"
      - id: build
        name: Build and push canonical image index
        if: steps.existing.outputs.exists != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: dist/container
          file: dist/container/Dockerfile
          platforms: linux/amd64,linux/arm64
          outputs: type=image,name=ghcr.io/jimeh/airplan,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            RELEASE_REVISION=${{ inputs.sha }}
            RELEASE_VERSION=${{ steps.release.outputs.version }}
          sbom: true
          provenance: false
          no-cache: true
          pull: true
      - id: subject
        name: Select image-index digest
        env:
          BUILD_DIGEST: ${{ steps.build.outputs.digest }}
          EXISTING_DIGEST: ${{ steps.existing.outputs.digest }}
        run: |
          echo "PUBLICATION_PHASE=select-digest" >>"$GITHUB_ENV"
          digest="$BUILD_DIGEST"
          if [[ -z "$digest" ]]; then
            digest="$EXISTING_DIGEST"
          else
            echo "PUSHED_DIGEST=$digest" >>"$GITHUB_ENV"
          fi
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "build did not return a valid image-index digest" >&2
            exit 1
          fi
          echo "digest=$digest" >>"$GITHUB_OUTPUT"
      - name: Verify provenance before reusing an existing tag
        if: steps.existing.outputs.exists == 'true'
        env:
          DIGEST: ${{ steps.subject.outputs.digest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PUBLICATION_PHASE=verify-existing-attestation" \
            >>"$GITHUB_ENV"
          gh attestation verify \
            "oci://$IMAGE_NAME@$DIGEST" \
            --repo "$GITHUB_REPOSITORY"
      - name: Verify image index and native runtime
        env:
          DIGEST: ${{ steps.subject.outputs.digest }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "PUBLICATION_PHASE=verify-image" >>"$GITHUB_ENV"
          reference="$IMAGE_NAME@$DIGEST"
          docker buildx imagetools inspect --raw "$reference" >index.json
          jq -e '
            .mediaType
              == "application/vnd.oci.image.index.v1+json"
            or .mediaType
              == "application/vnd.docker.distribution.manifest.list.v2+json"
          ' index.json >/dev/null
          jq -e '
            [.manifests[]
              | select(
                  (.annotations["vnd.docker.reference.type"] // "")
                    != "attestation-manifest"
                  and .platform.os != "unknown"
                )
              | "\(.platform.os)/\(.platform.architecture)"]
            | sort == ["linux/amd64", "linux/arm64"]
          ' index.json >/dev/null
          mapfile -t sbom_manifests < <(jq -r '
            .manifests[]
            | select(
                (.annotations["vnd.docker.reference.type"] // "")
                  == "attestation-manifest"
              )
            | .digest
          ' index.json)
          if [[ "${#sbom_manifests[@]}" -lt 2 ]]; then
            echo "image index is missing platform SBOM manifests" >&2
            exit 1
          fi
          for sbom_digest in "${sbom_manifests[@]}"; do
            docker buildx imagetools inspect --raw \
              "$IMAGE_NAME@$sbom_digest" |
              jq -e '
                [.layers[]
                  | select(
                      .annotations["in-toto.io/predicate-type"]
                        == "https://spdx.dev/Document"
                    )]
                | length >= 1
              ' >/dev/null
          done

          docker pull "$reference"
          inspect="$(docker image inspect "$reference")"
          jq -e '
            .[0].Config.User == "65532:65532"
            and .[0].Config.Entrypoint == ["/usr/local/bin/airplan"]
            and .[0].Config.Cmd == ["serve"]
            and .[0].Config.Volumes["/var/lib/airplan"] == {}
            and (.[] | .Config.Env | index("XDG_CONFIG_HOME=/etc"))
            and (.[] | .Config.Env
              | index("AIRPLAN_MANIFEST=/var/lib/airplan/manifest.jsonl"))
            and (.[] | .Config.Env
              | index("AIRPLAN_SERVER_HOST=0.0.0.0"))
            and (.[] | .Config.Env
              | index("AIRPLAN_SERVER_PORT=8080"))
            and (.[] | .Config.Env
              | index("AIRPLAN_SERVER_ALLOW_NON_LOOPBACK=true"))
            and (.[] | .Config.Env
              | all(startswith("AIRPLAN_CONFIG=") | not))
            and .[0].Config.Labels[
              "org.opencontainers.image.revision"
            ] == $revision
            and .[0].Config.Labels[
              "org.opencontainers.image.version"
            ] == $version
          ' --arg revision "$RELEASE_SHA" \
            --arg version "$VERSION" <<<"$inspect" >/dev/null
          output="$(docker run --rm "$reference" --version)"
          if [[ "$output" != "airplan version $VERSION" ]]; then
            echo "unexpected image version output: $output" >&2
            exit 1
          fi
          printf '# Writable temporary directory\n' |
            docker run --rm -i "$reference" \
              preview --output /tmp/airplan-container-check.html - \
              >/dev/null
          for executable in /bin/sh /bin/bash /usr/bin/apt /usr/bin/apt-get; do
            if docker run --rm --entrypoint "$executable" "$reference" \
              >/dev/null 2>&1; then
              echo "runtime unexpectedly contains $executable" >&2
              exit 1
            fi
          done
          AIRPLAN_CONTAINER_IMAGE="$reference" \
            scripts/container/integration.sh
      - name: Begin provenance attestation
        run: |
          echo "PUBLICATION_PHASE=attest-image" >>"$GITHUB_ENV"
      - name: Attest image provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ghcr.io/jimeh/airplan
          subject-digest: ${{ steps.subject.outputs.digest }}
          push-to-registry: true
      - name: Verify image provenance
        env:
          DIGEST: ${{ steps.subject.outputs.digest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PUBLICATION_PHASE=verify-attestation" >>"$GITHUB_ENV"
          gh attestation verify \
            "oci://$IMAGE_NAME@$DIGEST" \
            --repo "$GITHUB_REPOSITORY"
      - name: Assign and verify release tags
        env:
          DIGEST: ${{ steps.subject.outputs.digest }}
          EXISTING: ${{ steps.existing.outputs.exists }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          echo "PUBLICATION_PHASE=tag-image" >>"$GITHUB_ENV"
          resolve_digest() {
            docker buildx imagetools inspect "$1" |
              sed -n \
                's/^Digest:[[:space:]]*\\(sha256:[0-9a-f]\\{64\\}\\)$/\\1/p'
          }
          if [[ "$EXISTING" != "true" ]]; then
            if inspection="$(docker buildx imagetools inspect \
              "$IMAGE_NAME:$VERSION" 2>inspect-error)"; then
              current="$(sed -n \
                's/^Digest:[[:space:]]*\\(sha256:[0-9a-f]\\{64\\}\\)$/\\1/p' \
                <<<"$inspection")"
              if [[ "$current" != "$DIGEST" ]]; then
                echo "exact-version tag appeared with a conflicting digest" \
                  >&2
                exit 1
              fi
            elif grep -Eqi 'manifest unknown|name unknown|not found' \
              inspect-error; then
              docker buildx imagetools create \
                --tag "$IMAGE_NAME:$VERSION" \
                "$IMAGE_NAME@$DIGEST"
              echo "EXACT_TAG_CREATED=true" >>"$GITHUB_ENV"
            else
              cat inspect-error >&2
              exit 1
            fi
          fi
          if [[ "$(resolve_digest "$IMAGE_NAME:$VERSION")" != "$DIGEST" ]]; then
            echo "exact-version tag does not resolve to verified digest" >&2
            exit 1
          fi
          latest="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases/latest" \
            --jq '.tag_name')"
          if [[ "$latest" == "$RELEASE_TAG" ]]; then
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:latest" \
              "$IMAGE_NAME@$DIGEST"
            if [[ "$(resolve_digest "$IMAGE_NAME:latest")" != "$DIGEST" ]]; then
              echo "latest tag does not resolve to verified digest" >&2
              exit 1
            fi
          fi
      - name: Report container publication failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Container publication failed for $RELEASE_TAG"
          count="$(gh issue list --repo "$GITHUB_REPOSITORY" \
            --state all --search "\"$title\" in:title" \
            --json title --jq \
            "[.[] | select(.title == \"$title\")] | length")"
          if [[ "$count" != "0" ]]; then
            exit 0
          fi
          body="$(printf '%s\n\n%s\n%s\n%s\n%s\n%s\n%s\n' \
            "The immutable release was published and verified, but its downstream container publication failed." \
            "- Release: $RELEASE_TAG" \
            "- Expected SHA: $RELEASE_SHA" \
            "- Workflow run: $RUN_URL" \
            "- Phase: $PUBLICATION_PHASE" \
            "- Canonical digest pushed: $PUSHED_DIGEST" \
            "- Exact-version tag created: $EXACT_TAG_CREATED")"
          body+=$'\n\nRerun failed jobs after correcting the workflow or '
          body+="external GHCR package setting."
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$title" --body "$body"

  publish-cask:
    needs:
      - build-release
      - publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Restore generated Homebrew Cask
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.build-release.outputs.cask_artifact }}
          path: dist/homebrew/Casks
      # This downstream job is independently rerunnable after publication.
      # The Contents API update below is atomic, so a failed write leaves the
      # prior Cask in place.
      - id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: jimeh
          repositories: homebrew-tap
          permission-contents: write
      - name: Publish Homebrew Cask
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          cask=dist/homebrew/Casks/airplan.rb
          if [[ ! -s "$cask" ]]; then
            echo "generated Homebrew Cask is missing or empty" >&2
            exit 1
          fi

          path=Casks/airplan.rb
          existing_sha="$(gh api \
            "repos/jimeh/homebrew-tap/contents/${path}?ref=main" \
            --jq '.sha')"
          content="$(base64 -w 0 <"$cask")"
          gh api --method PUT \
            "repos/jimeh/homebrew-tap/contents/${path}" \
            -f message="chore: update airplan cask to $RELEASE_TAG" \
            -f content="$content" \
            -f sha="$existing_sha" \
            -f branch=main \
            --jq '.commit.sha'
      - name: Report Homebrew Cask publication failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Homebrew Cask publication failed for $RELEASE_TAG"
          message="The immutable release was published and verified, but the "
          message+="downstream Homebrew Cask publication job failed."
          body="$(printf '%s\n\n%s\n%s\n%s\n' \
            "$message" \
            "- Release: $RELEASE_TAG" \
            "- Repository: $GITHUB_REPOSITORY" \
            "- Workflow run: $RUN_URL")"
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "$title" --body "$body"
