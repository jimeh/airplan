name: semantic-pr

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  semantic-pr:
    runs-on: ubuntu-latest
    steps:
      - id: lint-pr-title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - if: always() && steps.lint-pr-title.outputs.error_message != null
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-title-lint-error
          message: |
            The pull request title must follow Conventional Commits.

            ```
            ${{ steps.lint-pr-title.outputs.error_message }}
            ```
      - if: steps.lint-pr-title.outputs.error_message == null
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-title-lint-error
          delete: true
