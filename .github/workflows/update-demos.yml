name: Update demos

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_refresh:
        description: Upload fresh copies even when current demos match
        required: true
        type: boolean
        default: true

concurrency:
  group: update-demos
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: read

env:
  MISE_DISABLE_TOOLS: go

jobs:
  update:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      BRANCH: docs/update-demo-links
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: .go-version
          cache-dependency-path: go.sum
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          add_shims_to_path: false
      - run: go test ./internal/cmd/updatedemos
      - run: mise run build
      - id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list --head "$BRANCH" --state open \
            --json number,headRepositoryOwner \
            --jq "map(select(.headRepositoryOwner.login == \
              \"${GITHUB_REPOSITORY_OWNER}\"))[0].number // \"\"")"
          if [[ -z "$pr_number" ]]; then
            exit 0
          fi
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH"
          candidate="$RUNNER_TEMP/demo-candidate-readme.md"
          git show "origin/$BRANCH:README.md" > "$candidate"
          echo "readme=$candidate" >> "$GITHUB_OUTPUT"
      - id: sync
        env:
          AIRPLAN_ENDPOINT: ${{ secrets.AIRPLAN_ENDPOINT }}
          AIRPLAN_BUCKET: ${{ secrets.AIRPLAN_BUCKET }}
          AIRPLAN_REGION: ${{ secrets.AIRPLAN_REGION }}
          AIRPLAN_ACCESS_KEY_ID: ${{ secrets.AIRPLAN_ACCESS_KEY_ID }}
          AIRPLAN_SECRET_ACCESS_KEY: ${{ secrets.AIRPLAN_SECRET_ACCESS_KEY }}
          AIRPLAN_PUBLIC_BASE_URL: ${{ secrets.AIRPLAN_PUBLIC_BASE_URL }}
          AIRPLAN_KEY_PREFIX: ${{ secrets.AIRPLAN_KEY_PREFIX }}
          CANDIDATE_README: ${{ steps.candidate.outputs.readme }}
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh }}
        run: |
          args=(--airplan ./bin/airplan)
          if [[ -n "$CANDIDATE_README" ]]; then
            args+=(--candidate-readme "$CANDIDATE_README")
          fi
          if [[ "$FORCE_REFRESH" == "true" ]]; then
            args+=(--force)
          fi
          go run ./internal/cmd/updatedemos "${args[@]}"
          if git diff --quiet -- README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.sync.outputs.changed == 'true'
        run: mise run format:markdown:check
      - if: steps.sync.outputs.changed == 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
      - if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          sign-commits: true
          add-paths: README.md
          branch: ${{ env.BRANCH }}
          base: main
          commit-message: "docs: refresh live demo links"
          title: "docs: refresh live demo links"
          body: |
            Refreshes README demo links after comparing the published page and
            source bytes with the repository's upload-mode fixtures. Published
            demo URLs are permanent and are never deleted by this workflow.
          draft: false
