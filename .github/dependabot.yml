version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      go-dependencies:
        patterns: ["*"]
    commit-message:
      # semantic-pr enforces conventional titles; release-please
      # reads them.
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    commit-message:
      prefix: "ci(deps)"
