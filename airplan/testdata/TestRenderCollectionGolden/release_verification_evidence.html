<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="robots" content="noindex, nofollow">
<title>Release verification evidence</title>
<script>
try {
  const theme = localStorage.getItem('airplan-theme');
  if (theme === 'light' || theme === 'dark') {
    document.documentElement.dataset.theme = theme;
  }
} catch (_) {}

</script>
<style>
:root {
  color-scheme: light dark;
  --bg: light-dark(#ffffff, #0d1117);
  --fg: light-dark(#1f2328, #e6edf3);
  --heading: light-dark(#1f2328, #f0f6fc);
  --subheading: light-dark(#3d444d, #c9d1d9);
  --muted: light-dark(#59636e, #9198a1);
  --link: light-dark(#0969da, #4493f8);
  --border: light-dark(#d1d9e0, #3d444d);
  --surface-subtle: light-dark(#f6f8fa, #151b23);
  --code-inline-bg: light-dark(#eff1f3, #212830);
  --code-bg: light-dark(#f6f8fa, #151b23);
  --code-border: light-dark(#d1d9e0, #30363d);
  --control-track: light-dark(#eff1f3, #21262d);
  --control-active: light-dark(#ffffff, #30363d);
  --control-hover: light-dark(#eff1f3, #21262d);
  --control-divider: light-dark(#d8dee4, #30363d);
  --on-link: light-dark(#ffffff, #0d1117);
  --page-width: 54rem;
}

:root[data-theme="light"] {
  color-scheme: light;
}

:root[data-theme="dark"] {
  color-scheme: dark;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
    Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
  font-size: 16px;
  line-height: 1.7;
  -webkit-text-size-adjust: 100%;
}

.toolbar {
  width: 100%;
  padding: 0.75rem 1.25rem 0;
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.85rem;
}

.toolbar:not(:has(> :not([hidden]))) {
  display: none;
}

.toolbar a,
.toolbar button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  white-space: nowrap;
  font: inherit;
  color: var(--muted);
  background: transparent;
  text-decoration: none;
  border: 0;
  border-radius: 8px;
  padding: 0.4rem 0.65rem;
  cursor: pointer;
}

.toolbar a:hover,
.toolbar button:hover {
  color: var(--fg);
  background: var(--control-hover);
}

.toolbar a:focus-visible,
.toolbar button:focus-visible {
  outline: 2px solid var(--link);
  outline-offset: 2px;
}

.toolbar-actions {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
}

.mode-toggle {
  display: inline-flex;
  gap: 2px;
  padding: 2px;
  background: var(--control-track);
  border: 0;
  border-radius: 8px;
}

.mode-toggle button {
  border: 0;
  border-radius: 6px;
  padding: 0.3rem 0.55rem;
}

.mode-toggle button:hover {
  color: var(--fg);
}

.mode-toggle button.active {
  color: var(--fg);
  background: var(--control-active);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
}

.themetoggle button {
  width: 1.85rem;
  padding-inline: 0;
}

.themetoggle:not(:first-child) {
  position: relative;
  margin-left: 0.5rem;
}

.themetoggle:not(:first-child)::before {
  content: "";
  position: absolute;
  top: 50%;
  left: -0.825rem;
  width: 1px;
  height: 1rem;
  background: var(--control-divider);
  transform: translateY(-50%);
}

.icon {
  width: 16px;
  height: 16px;
  flex: none;
}

.sr-status {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip-path: inset(50%);
  white-space: nowrap;
}

[hidden] {
  display: none !important;
}

@media (max-width: 36rem) {
  .toolbar {
    padding-inline: 1rem;
  }

  .themetoggle:not(:first-child) {
    margin-left: 0;
  }

  .themetoggle:not(:first-child)::before {
    display: none;
  }
}

@media print {
  :root,
  :root[data-theme] {
    color-scheme: light;
  }

  .toolbar {
    display: none !important;
  }
}

.page-shell {
  width: min(100%, var(--page-width));
  min-height: 100vh;
  margin: 0 auto;
  padding-bottom: 4rem;
}

header,
.files {
  margin-inline: 1.5rem;
}

header {
  padding: 1.5rem 0 1.75rem;
  border-bottom: 1px solid var(--border);
}

h1 {
  margin: 0.35em 0;
  color: var(--heading);
  font-size: 2em;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.25;
  overflow-wrap: anywhere;
}

.summary {
  margin: 0;
  color: var(--muted);
  font-size: 0.9rem;
}

.files {
  padding: 0;
  list-style: none;
}

.file {
  padding: 1.5rem 0 1.75rem;
  border-bottom: 1px solid var(--border);
}

.file-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 1rem;
}

.details {
  min-width: 0;
}

.details h2 {
  margin: 0;
  color: var(--heading);
  font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
    "Liberation Mono", monospace;
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.5;
  overflow-wrap: anywhere;
}

.meta {
  margin-top: 0.2rem;
  color: var(--muted);
  font-size: 0.8rem;
  overflow-wrap: anywhere;
}

.actions {
  display: flex;
  flex: none;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 0.15rem;
  margin: -0.35rem 0 0;
  font-size: 0.82rem;
}

.actions a,
.actions button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 2.1rem;
  border: 0;
  border-radius: 8px;
  padding: 0.4rem 0.65rem;
  background: transparent;
  color: var(--muted);
  font: inherit;
  text-decoration: none;
  white-space: nowrap;
  cursor: pointer;
}

.actions a:hover,
.actions button:hover {
  background: var(--control-hover);
  color: var(--fg);
}

.actions :where(a, button):focus-visible {
  outline: 2px solid var(--link);
  outline-offset: 2px;
}

.actions a:first-child {
  color: var(--link);
}

.preview {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1rem;
  overflow: hidden;
  border-radius: 8px;
  background: var(--surface-subtle);
}

.preview--audio {
  border: 1px solid var(--border);
}

.preview-link {
  display: block;
  width: 100%;
}

.preview-link:focus-visible {
  outline: 2px solid var(--link);
  outline-offset: -2px;
}

.preview img {
  display: block;
  width: 100%;
  height: auto;
}

.preview video {
  display: block;
  width: 100%;
  max-height: 70vh;
  object-fit: contain;
}

.preview audio {
  width: min(100% - 2rem, 40rem);
  margin: 1.5rem 1rem;
}

@media (max-width: 36rem) {
  .toolbar {
    display: grid;
    grid-template-columns: max-content 1fr max-content;
    justify-content: stretch;
  }

  .collection-actions {
    grid-column: 1 / 3;
    grid-row: 1;
    justify-self: start;
  }

  .toolbar .themetoggle {
    grid-column: 3;
    grid-row: 1;
    justify-self: end;
  }

  header,
  .files {
    margin-inline: 1.25rem;
  }

  header {
    padding-top: 1rem;
  }

  h1 {
    font-size: 1.75em;
  }

  .file-header {
    display: block;
  }

  .actions {
    justify-content: flex-start;
    margin: 0.65rem 0 -0.35rem -0.65rem;
  }
}

</style>
</head>
<body>
<div class="page-shell">
<nav class="toolbar" aria-label="Collection controls">
  <div class="collection-actions toolbar-actions">
    <button type="button" data-copy-overview>Copy page link</button>
    <a href="https://github.com/jimeh/airplan">Repository</a>
  </div>
<div class="themetoggle mode-toggle js-only" hidden
  role="group" aria-label="Color theme">
  <button type="button" data-theme="light" aria-pressed="false"
    aria-label="Light theme" title="Light theme"><svg class="icon"
    aria-hidden="true" viewBox="0 0 16 16" fill="none"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle
    cx="8" cy="8" r="2.75"/><path
    d="M8 1.25v1.5M8 13.25v1.5M1.25 8h1.5M13.25 8h1.5M3.23 3.23l1.06 1.06M11.71 11.71l1.06 1.06M12.77 3.23l-1.06 1.06M4.29 11.71l-1.06 1.06"/></svg></button>
  <button type="button" class="active" data-theme="system"
    aria-pressed="true" aria-label="System theme"
    title="System theme"><svg class="icon" aria-hidden="true"
    viewBox="0 0 16 16" fill="none" stroke="currentColor"
    stroke-width="1.5" stroke-linecap="round"
    stroke-linejoin="round"><rect x="1.5" y="2.5" width="13"
    height="9" rx="1.25"/><path d="M5.5 14h5M8 11.5V14"/></svg></button>
  <button type="button" data-theme="dark" aria-pressed="false"
    aria-label="Dark theme" title="Dark theme"><svg class="icon"
    aria-hidden="true" viewBox="0 0 16 16" fill="currentColor"><path
    d="M6.2 1.35a.75.75 0 0 1 .56.9A5.45 5.45 0 0 0 13.75 8.7a.75.75 0 0 1 .93.51.75.75 0 0 1-.22.77A7.15 7.15 0 1 1 5.43 1.46a.75.75 0 0 1 .77-.11Zm-1.18 1.9a5.65 5.65 0 1 0 7.54 7.13 6.95 6.95 0 0 1-7.54-7.13Z"/></svg></button>
</div>

</nav>
<header>
  <h1>Release verification evidence</h1>
  <p class="summary">3 files · 1.7 KiB</p>
</header>
<ol class="files" aria-label="Uploaded files">
  <li class="file">
    <div class="file-header">
      <div class="details">
        <h2>verification-summary.svg</h2>
        <div class="meta">image/svg&#43;xml · 1.5 KiB</div>
      </div>
      <div class="actions">
        <a href="./verification-summary.svg">Open</a>
        <a href="./verification-summary.svg" download>Download</a>
        <button type="button" data-copy="./verification-summary.svg">Copy link</button>
      </div>
    </div>
    <div class="preview preview--image">
      <a class="preview-link" href="./verification-summary.svg">
        <img src="./verification-summary.svg" alt="verification-summary.svg" loading="lazy">
      </a>
    </div>
  </li>
  <li class="file">
    <div class="file-header">
      <div class="details">
        <h2>checks.json</h2>
        <div class="meta">text/plain; charset=utf-8 · 89 B</div>
      </div>
      <div class="actions">
        <a href="./checks.json">Open</a>
        <a href="./checks.json" download>Download</a>
        <button type="button" data-copy="./checks.json">Copy link</button>
      </div>
    </div>
  </li>
  <li class="file">
    <div class="file-header">
      <div class="details">
        <h2>release-notes.txt</h2>
        <div class="meta">text/plain; charset=utf-8 · 131 B</div>
      </div>
      <div class="actions">
        <a href="./release-notes.txt">Open</a>
        <a href="./release-notes.txt" download>Download</a>
        <button type="button" data-copy="./release-notes.txt">Copy link</button>
      </div>
    </div>
  </li>
</ol>
</div>
<script>
(function () {
  'use strict';
  var d = document;

  d.querySelectorAll('.js-only').forEach(function (el) {
    el.hidden = false;
  });

  var root = d.documentElement;
  var themeMedia = window.matchMedia('(prefers-color-scheme: dark)');

  function selectedTheme() {
    return root.dataset.theme || 'system';
  }

  function resolvedTheme() {
    var selected = selectedTheme();
    if (selected !== 'system') return selected;
    return themeMedia.matches ? 'dark' : 'light';
  }

  function announceThemeChange() {
    window.dispatchEvent(new CustomEvent('airplan:themechange', {
      detail: { theme: resolvedTheme() }
    }));
  }

  function syncThemeButtons() {
    var selected = selectedTheme();
    d.querySelectorAll('.themetoggle button').forEach(function (button) {
      var active = button.dataset.theme === selected;
      button.classList.toggle('active', active);
      button.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  d.querySelectorAll('.themetoggle button').forEach(function (button) {
    button.addEventListener('click', function () {
      var theme = button.dataset.theme;
      if (theme === 'system') {
        delete root.dataset.theme;
      } else {
        root.dataset.theme = theme;
      }
      try {
        if (theme === 'system') {
          localStorage.removeItem('airplan-theme');
        } else {
          localStorage.setItem('airplan-theme', theme);
        }
      } catch (_) {}
      syncThemeButtons();
      announceThemeChange();
    });
  });
  themeMedia.addEventListener('change', function () {
    if (selectedTheme() === 'system') announceThemeChange();
  });
  syncThemeButtons();
}());

(function () {
  'use strict';
  var d = document;

  d.addEventListener('click', function (event) {
    var button = event.target.closest('[data-copy],[data-copy-overview]');
    if (!button) return;
    var url = button.hasAttribute('data-copy-overview')
      ? location.href
      : new URL(button.dataset.copy, d.baseURI).href;
    if (!navigator.clipboard) {
      prompt('Copy link', url);
      return;
    }
    navigator.clipboard.writeText(url).then(function () {
      var old = button.textContent;
      button.textContent = 'Copied';
      setTimeout(function () { button.textContent = old; }, 1200);
    }, function () {
      prompt('Copy link', url);
    });
  });
}());

</script>
</body>
</html>
