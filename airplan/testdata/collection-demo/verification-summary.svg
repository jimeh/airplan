<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img"
  aria-labelledby="title description">
  <title id="title">Release verification summary</title>
  <desc id="description">
    Three completed verification checks for an Airplan release.
  </desc>
  <rect width="1200" height="675" fill="#0d1117" />
  <rect x="76" y="74" width="1048" height="527" rx="28" fill="#161b22"
    stroke="#30363d" stroke-width="4" />
  <text x="132" y="168" fill="#f0f6fc" font-family="system-ui, sans-serif"
    font-size="50" font-weight="700">Release verification</text>
  <text x="132" y="220" fill="#8b949e" font-family="system-ui, sans-serif"
