    <text x="202" y="326">Automated checks passed</text>
    <circle cx="154" cy="415" r="22" fill="#238636" />
    <path d="m143 415 8 8 15-18" fill="none" stroke="#fff"
      stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="202" y="426">Browser review completed</text>
    <circle cx="154" cy="515" r="22" fill="#238636" />
    <path d="m143 515 8 8 15-18" fill="none" stroke="#fff"
      stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
    <text x="202" y="526">Artifacts ready to share</text>
  </g>
