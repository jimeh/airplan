[settings]
idiomatic_version_file_enable_tools = ["go"]
lockfile = true

[settings.task]
run_auto_install = true

[tools]
node = "24"
"go:golang.org/x/vuln/cmd/govulncheck" = "1"
goreleaser = "2"
golangci-lint = "2"
lefthook = "2"
actionlint = "1"
zizmor = "1"
pinact = "4"
oxfmt = "0"
syft = "1"
"github:jimeh/treeboot" = "0"

[tasks.build]
description = "Build the airplan binary (skipped when nothing changed)"
run = "go build -o bin/airplan ."
sources = [
  "main.go",
  "go.mod",
  "go.sum",
  "cli/**/*.go",
  "airplan/**/*",
  "skills/**/*",
]
outputs = ["bin/airplan"]

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks."test:coverage"]
description = "Run all tests and write statement coverage reports"
run = [
  "go test -covermode=atomic -coverprofile=coverage.out ./...",
  "go tool cover -func=coverage.out",
  "go tool cover -html=coverage.out -o coverage.html",
]

[tasks.test-integration]
description = "Round-trip tests against a throwaway MinIO container"
run = "go test -tags integration -count=1 -v -run TestIntegration ./airplan/"

[tasks."test:browser"]
description = "Run rendered-page browser smoke tests in Chromium"
run = [
  "npm ci",
  "npx playwright install chromium",
  "npx playwright test",
]

[tasks."audit:deps"]
description = "Verify and scan Go and npm dependencies"
run = ["go mod verify", "govulncheck ./...", "npm audit --audit-level=high"]

[tasks.generate]
description = "Regenerate committed generated files"
run = "go generate ./..."

[tasks."generate:check"]
description = "Check generated files are up to date"
run = [
  "go run ./internal/cmd/genschema --check schema/airplan.schema.json",
  "go run ./internal/cmd/genmermaid --check internal/deps/mermaid.json airplan/mermaid_generated.go",
]

[tasks."check:spec-sync"]
description = "Check contract changes include specification version updates"
run = "go run ./internal/cmd/checkspecsync"

[tasks."check:go-version"]
description = "Check .go-version matches the go.mod Go directive"
run = "go run ./internal/cmd/checkgoversion"

[tasks."update:mermaid"]
description = "Update the pinned Mermaid release after its minimum age"
run = "go run ./internal/cmd/updatemermaid"

[tasks.lint]
description = "All lints"
depends = ["lint:go", "lint:workflows"]

[tasks."lint:go"]
description = "Lint Go code"
run = "golangci-lint run"

[tasks."lint:workflows"]
description = "Validate GitHub Actions: syntax, security, SHA pins"
run = [
  "actionlint",
  "zizmor --offline .github/workflows",
  "pinact run --check",
]

[tasks.format]
description = "Format everything (write mode)"
depends = ["format:go", "format:markdown"]

[tasks."format:check"]
description = "Check formatting without writing changes"
depends = ["format:go:check", "format:markdown:check"]

[tasks."format:go"]
description = "Format Go code"
run = "golangci-lint fmt"

[tasks."format:go:check"]
description = "Check Go formatting without writing changes"
run = "golangci-lint fmt --diff"

[tasks."format:markdown"]
description = "Format Markdown files"
run = "oxfmt \"**/*.md\""

[tasks."format:markdown:check"]
description = "Check Markdown formatting without writing changes"
run = "oxfmt --check \"**/*.md\""

[tasks.check]
description = "Fast confidence gate: lints, generation, format checks, tests"
depends = ["check:go", "lint:workflows", "format:markdown:check"]

[tasks."check:go"]
description = "Go confidence gate: lint, generation, format, version, tests"
depends = [
  "lint:go",
  "generate:check",
  "format:go:check",
  "check:go-version",
  "test",
]

[tasks."release:snapshot"]
description = "Build a release snapshot without publishing"
run = [
  "goreleaser check",
  "goreleaser release --snapshot --clean --skip=publish",
]

[tasks.verify]
description = "Broad local validation before handoff"
depends = ["check", "audit:deps", "test-integration", "release:snapshot"]

[tasks.setup]
description = "Install tools and git hooks"
run = ["mise install", "lefthook install"]

[tasks.treeboot]
description = "Bootstrap the current worktree with treeboot"
run = "treeboot"
