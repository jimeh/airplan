[tools]
go = "1.26.4"
goreleaser = "2.17.0"
golangci-lint = "2.12.2"
lefthook = "2.1.9"
actionlint = "1.7.12"
zizmor = "1.26.1"
pinact = "4.1.0"

[tasks.build]
description = "Build the airplan binary (skipped when nothing changed)"
run = "go build -o bin/airplan ."
sources = ["main.go", "go.mod", "go.sum", "cli/**/*.go", "airplan/**/*"]
outputs = ["bin/airplan"]

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-integration]
description = "Round-trip tests against a throwaway MinIO container"
run = "go test -tags integration -count=1 -v -run TestIntegration ./airplan/"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format Go code"
run = "golangci-lint fmt"

[tasks.check]
description = "Fast confidence gate: lint + tests"
depends = ["lint", "test"]

[tasks.lint-workflows]
description = "Validate GitHub Actions: syntax, security, SHA pins"
run = [
  "actionlint",
  "zizmor --offline .github/workflows",
  "pinact run --check",
]

[tasks.verify]
description = "CI-equivalent validation before handoff"
depends = ["check", "lint-workflows", "test-integration"]
run = "goreleaser check"

[tasks.setup]
description = "Install tools and git hooks"
run = ["mise install", "lefthook install"]
